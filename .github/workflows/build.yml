name: Build dylib for root injection
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Build dylib
        run: |
          cd $GITHUB_WORKSPACE
          make

      - name: Sign and prepare for root injection
        run: |
          export THEOS=$HOME/theos
          DYLIB=$(find .theos -name "*.dylib" | head -1)
          # Ajustar install name para que apunte a la raíz del ejecutable
          $THEOS/toolchain/linux/iphone/bin/install_name_tool -id "@executable_path/DiscordPro.dylib" "$DYLIB"
          # Firmar con los entitlements
          $THEOS/toolchain/linux/iphone/bin/ldid -SEntitlements.plist "$DYLIB"
          # Copiar el archivo listo para subir
          cp "$DYLIB" DiscordPro_root.dylib

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordPro-dylib
          path: DiscordPro_root.dylib
