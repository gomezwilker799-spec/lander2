name: Build and Sign dylib only
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Build dylib
        run: |
          cd $GITHUB_WORKSPACE
          make

      - name: Sign dylib
        run: |
          export THEOS=$HOME/theos
          DYLIB=$(find .theos -name "*.dylib" | head -1)
          $THEOS/toolchain/linux/iphone/bin/install_name_tool -id "@executable_path/Frameworks/DiscordPro.dylib" "$DYLIB"
          $THEOS/toolchain/linux/iphone/bin/ldid -SEntitlements.plist "$DYLIB"
          mkdir -p output
          cp "$DYLIB" output/DiscordPro.dylib

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordPro-dylib
          path: output/DiscordPro.dylib
