name: Build Discord Tweak
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos (oficial, incluye vendor y SDK)
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Build tweak (solo el .dylib)
        run: |
          cd $GITHUB_WORKSPACE
          make

      - name: Prepare dylib for upload
        run: |
          mkdir -p output
          find .theos -name "*.dylib" -exec cp {} output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordPro-dylib
          path: output/
