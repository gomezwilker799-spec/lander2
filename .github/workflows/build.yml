name: Build, Patch and Inject dylib
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Build our dylib
        run: |
          cd $GITHUB_WORKSPACE
          make

      - name: Download and compile dylib-patcher
        run: |
          git clone https://github.com/ProcursusTeam/dylib-patcher.git
          cd dylib-patcher
          cargo build --release
          cp target/release/dylib-patcher $GITHUB_WORKSPACE/
          cd ..

      - name: Patch our dylib
        run: |
          DYLIB=$(find .theos -name "*.dylib" | head -1)
          ./dylib-patcher "$DYLIB" -o DiscordPro_patched.dylib

      - name: Download IPA
        run: |
          curl -L -o Discord.ipa "https://github.com/gomezwilker799-spec/lander2/releases/download/v1.0/Discord_335.0_1784070599.ipa"

      - name: Extract IPA
        run: |
          unzip Discord.ipa -d ipa_contents
          APP=$(find ipa_contents/Payload -name "*.app" -type d | head -1)
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Copy patched dylib into Frameworks
        run: |
          mkdir -p "$APP_PATH/Frameworks"
          cp DiscordPro_patched.dylib "$APP_PATH/Frameworks/DiscordPro.dylib"

      - name: Modify Info.plist to load dylib
        run: |
          python3 << 'PYEOF'
          import os, plistlib

          app_path = os.environ["APP_PATH"]
          plist_path = os.path.join(app_path, "Info.plist")

          with open(plist_path, "rb") as f:
              plist = plistlib.load(f)

          if "LSEnvironment" not in plist:
              plist["LSEnvironment"] = {}
          plist["LSEnvironment"]["DYLD_INSERT_LIBRARIES"] = "@executable_path/Frameworks/DiscordPro.dylib"

          with open(plist_path, "wb") as f:
              plistlib.dump(plist, f)
          PYEOF

      - name: Repackage IPA
        run: |
          cd ipa_contents
          zip -r ../Discord_patched.ipa Payload
          cd ..

      - name: Upload patched IPA
        uses: actions/upload-artifact@v4
        with:
          name: Discord-patched
          path: Discord_patched.ipa
