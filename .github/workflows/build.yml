name: Build Discord Tweak
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          git clone --depth=1 https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install dpkg and other build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev

      - name: Download iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          curl -L -o sdk.zip https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q sdk.zip
          mv sdks-master/*.sdk .
          rm -rf sdks-master sdk.zip

      - name: Build tweak
        run: |
          cd $GITHUB_WORKSPACE
          make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordPro
          path: packages/*.deb
