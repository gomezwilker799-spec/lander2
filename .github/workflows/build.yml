name: Build dylib with SDK 15.6
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Download iPhoneOS 15.6 SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          curl -L -o sdk.zip https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q sdk.zip
          # Mover SOLO el SDK 15.6 a la carpeta de SDKs
          mv sdks-master/iPhoneOS15.6.sdk .
          rm -rf sdks-master sdk.zip
          # Verificar que el SDK se instaló
          ls -la iPhoneOS15.6.sdk

      - name: Build dylib
        run: |
          cd $GITHUB_WORKSPACE
          make

      - name: Prepare artifact
        run: |
          mkdir -p output
          find .theos -name "*.dylib" -exec cp {} output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TweakCompleto-dylib
          path: output/
