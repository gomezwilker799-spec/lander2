name: Build and Sign Discord Tweak
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos (oficial, incluye toolchain y ldid)
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Build tweak
        run: |
          cd $GITHUB_WORKSPACE
          make

      - name: Sign dylib using Theos ldid
        run: |
          export THEOS=$HOME/theos
          DYLIB=$(find .theos/obj/debug -name "*.dylib" | head -1)
          $THEOS/bin/ldid -S "$DYLIB"

      - name: Prepare artifact
        run: |
          mkdir -p output
          find .theos -name "*.dylib" -exec cp {} output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordPro-dylib
          path: output/
